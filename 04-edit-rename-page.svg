<svg width="100%" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Edit Filename Page</title>
  <desc>Mockup of the edit.ejs page for renaming a file</desc>

  <!-- Background -->
  <rect width="680" height="360" rx="14" fill="#18181b"/>

  <!-- Browser bar -->
  <rect x="0" y="0" width="680" height="44" rx="14" fill="#27272a"/>
  <rect x="0" y="30" width="680" height="14" fill="#27272a"/>
  <circle cx="24" cy="22" r="5" fill="#ef4444" opacity=".8"/>
  <circle cx="42" cy="22" r="5" fill="#f59e0b" opacity=".8"/>
  <circle cx="60" cy="22" r="5" fill="#22c55e" opacity=".8"/>
  <rect x="120" y="10" width="440" height="24" rx="6" fill="#3f3f46"/>
  <text x="340" y="26" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#71717a">localhost:3000/edit/shopping.txt</text>

  <!-- Page content -->
  <rect x="0" y="44" width="680" height="316" fill="#18181b"/>

  <!-- Back link -->
  <text x="40" y="82" font-family="sans-serif" font-size="13" fill="#3b82f6">← Go back to home</text>

  <!-- Heading label -->
  <text x="40" y="118" font-family="sans-serif" font-size="13" fill="#71717a">Rename file</text>

  <!-- Previous name field (pre-filled, muted) -->
  <rect x="40" y="130" width="280" height="40" rx="8" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="56" y="155" font-family="sans-serif" font-size="13" fill="#71717a">shopping.txt</text>
  <!-- Lock icon hint -->
  <text x="300" y="155" text-anchor="end" font-family="sans-serif" font-size="11" fill="#3f3f46">previous</text>

  <!-- Arrow -->
  <text x="338" y="155" font-family="sans-serif" font-size="18" fill="#52525b">→</text>

  <!-- New name field (active, white cursor) -->
  <rect x="360" y="130" width="280" height="40" rx="8" fill="#27272a" stroke="#2563eb" stroke-width="1.5"/>
  <text x="376" y="155" font-family="sans-serif" font-size="13" fill="#f4f4f5">shopping_list</text>
  <rect x="474" y="138" width="2" height="20" rx="1" fill="#2563eb"/>
  <text x="620" y="155" text-anchor="end" font-family="sans-serif" font-size="11" fill="#3f3f46">new name</text>

  <!-- Hint: .txt auto-appended -->
  <text x="360" y="188" font-family="sans-serif" font-size="11" fill="#52525b">.txt extension is preserved by the filesystem</text>

  <!-- Submit button -->
  <rect x="40" y="204" width="130" height="38" rx="8" fill="#ca8a04"/>
  <text x="105" y="228" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff" font-weight="500">Update name</text>

  <!-- fs.rename diagram -->
  <rect x="40" y="264" width="600" height="68" rx="10" fill="#1c1c1e" stroke="#3f3f46" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="60" y="286" font-family="sans-serif" font-size="11" fill="#52525b" font-weight="500">fs.rename()</text>

  <rect x="60" y="294" width="110" height="26" rx="6" fill="#27272a"/>
  <text x="115" y="311" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#71717a">shopping.txt</text>

  <text x="190" y="311" font-family="sans-serif" font-size="13" fill="#52525b">→</text>

  <rect x="210" y="294" width="130" height="26" rx="6" fill="#ca8a04" opacity=".7"/>
  <text x="275" y="311" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff">shopping_list.txt</text>

  <text x="360" y="311" font-family="sans-serif" font-size="11" fill="#52525b">then  res.redirect('/')</text>

  <!-- Route label bottom -->
  <text x="340" y="348" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3f3f46">POST /edit  →  fs.rename()  →  redirect to /</text>
</svg>
