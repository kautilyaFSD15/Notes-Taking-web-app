<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Home Dashboard</title>
  <desc>The main page of the File Manager app showing the task list and create form</desc>

  <!-- Background -->
  <rect width="680" height="420" rx="14" fill="#18181b"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="680" height="48" rx="14" fill="#27272a"/>
  <rect x="0" y="34" width="680" height="14" fill="#27272a"/>
  <circle cx="24" cy="24" r="6" fill="#ef4444" opacity=".8"/>
  <circle cx="44" cy="24" r="6" fill="#f59e0b" opacity=".8"/>
  <circle cx="64" cy="24" r="6" fill="#22c55e" opacity=".8"/>
  <text x="340" y="28" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#a1a1aa" font-weight="500">📝 File Manager — localhost:3000</text>

  <!-- Create form area -->
  <rect x="24" y="64" width="632" height="110" rx="10" fill="#27272a"/>
  <!-- Title input -->
  <rect x="40" y="80" width="600" height="36" rx="8" fill="#3f3f46"/>
  <text x="56" y="103" font-family="sans-serif" font-size="13" fill="#71717a">title goes here</text>
  <!-- Textarea -->
  <rect x="40" y="122" width="600" height="36" rx="8" fill="#3f3f46"/>
  <text x="56" y="145" font-family="sans-serif" font-size="13" fill="#71717a">Write your task details here</text>
  <!-- Submit button -->
  <rect x="40" y="164" width="110" height="34" rx="8" fill="#2563eb"/>
  <text x="95" y="186" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff" font-weight="500">Create task</text>

  <!-- Section label -->
  <text x="40" y="214" font-family="sans-serif" font-size="11" fill="#52525b" font-weight="500" letter-spacing="1">TASKS</text>

  <!-- Task cards row -->
  <!-- Card 1 -->
  <rect x="24" y="224" width="190" height="90" rx="10" fill="#27272a"/>
  <text x="40" y="252" font-family="sans-serif" font-size="15" fill="#f4f4f5" font-weight="600">shopping.txt</text>
  <text x="40" y="280" font-family="sans-serif" font-size="12" fill="#3b82f6">Read More</text>
  <text x="190" y="280" text-anchor="end" font-family="sans-serif" font-size="12" fill="#52525b">Edit filename</text>
  <rect x="24" y="308" width="190" height="2" rx="1" fill="#3f3f46"/>

  <!-- Card 2 -->
  <rect x="230" y="224" width="190" height="90" rx="10" fill="#27272a"/>
  <text x="246" y="252" font-family="sans-serif" font-size="15" fill="#f4f4f5" font-weight="600">groceries.txt</text>
  <text x="246" y="280" font-family="sans-serif" font-size="12" fill="#3b82f6">Read More</text>
  <text x="396" y="280" text-anchor="end" font-family="sans-serif" font-size="12" fill="#52525b">Edit filename</text>
  <rect x="230" y="308" width="190" height="2" rx="1" fill="#3f3f46"/>

  <!-- Card 3 -->
  <rect x="436" y="224" width="190" height="90" rx="10" fill="#27272a"/>
  <text x="452" y="252" font-family="sans-serif" font-size="15" fill="#f4f4f5" font-weight="600">notes.txt</text>
  <text x="452" y="280" font-family="sans-serif" font-size="12" fill="#3b82f6">Read More</text>
  <text x="602" y="280" text-anchor="end" font-family="sans-serif" font-size="12" fill="#52525b">Edit filename</text>
  <rect x="436" y="308" width="190" height="2" rx="1" fill="#3f3f46"/>

  <!-- Ghost card (hidden placeholder) -->
  <rect x="24" y="332" width="190" height="70" rx="10" fill="#27272a" opacity=".3"/>
  <text x="40" y="355" font-family="sans-serif" font-size="11" fill="#3f3f46">+ new task</text>

  <!-- Route label -->
  <text x="340" y="400" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3f3f46">GET  /  →  index.ejs</text>
</svg>
