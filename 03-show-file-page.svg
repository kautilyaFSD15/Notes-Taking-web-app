<svg width="100%" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Show File Page</title>
  <desc>Mockup of the show.ejs page displaying file content</desc>

  <!-- Background -->
  <rect width="680" height="360" rx="14" fill="#18181b"/>

  <!-- Browser bar -->
  <rect x="0" y="0" width="680" height="44" rx="14" fill="#27272a"/>
  <rect x="0" y="30" width="680" height="14" fill="#27272a"/>
  <circle cx="24" cy="22" r="5" fill="#ef4444" opacity=".8"/>
  <circle cx="42" cy="22" r="5" fill="#f59e0b" opacity=".8"/>
  <circle cx="60" cy="22" r="5" fill="#22c55e" opacity=".8"/>
  <!-- URL bar -->
  <rect x="120" y="10" width="440" height="24" rx="6" fill="#3f3f46"/>
  <text x="340" y="26" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#71717a">localhost:3000/file/shopping.txt</text>

  <!-- Page content area -->
  <rect x="0" y="44" width="680" height="316" rx="0" fill="#18181b"/>

  <!-- Back link -->
  <text x="40" y="80" font-family="sans-serif" font-size="13" fill="#3b82f6">← Go back to home</text>

  <!-- Filename heading -->
  <text x="40" y="128" font-family="sans-serif" font-size="28" fill="#f4f4f5" font-weight="700" letter-spacing="-1">shopping.txt</text>

  <!-- Divider -->
  <line x1="40" y1="140" x2="640" y2="140" stroke="#27272a" stroke-width="1"/>

  <!-- File content text (mocked) -->
  <text x="40" y="168" font-family="sans-serif" font-size="15" fill="#bfdbfe">Buy milk, eggs, bread and coffee.</text>
  <text x="40" y="192" font-family="sans-serif" font-size="15" fill="#bfdbfe">Don't forget to grab the cheese from</text>
  <text x="40" y="216" font-family="sans-serif" font-size="15" fill="#bfdbfe">the back of the store.</text>
  <text x="40" y="240" font-family="sans-serif" font-size="15" fill="#bfdbfe">Also pick up some fresh vegetables.</text>

  <!-- Cursor blink -->
  <rect x="40" y="252" width="2" height="16" rx="1" fill="#3b82f6" opacity=".7"/>

  <!-- Route label bottom -->
  <text x="340" y="340" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3f3f46">GET /file/:filename  →  show.ejs  —  fs.readFile()</text>
</svg>
