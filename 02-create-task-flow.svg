<svg width="100%" viewBox="0 0 680 380" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Create Task Flow</title>
  <desc>Diagram showing the POST /create flow from form submission to file write and redirect</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="380" rx="14" fill="#18181b"/>

  <!-- Heading -->
  <text x="340" y="40" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#a1a1aa" font-weight="500">Create Task — POST /create</text>

  <!-- Step 1: User fills form -->
  <rect x="40" y="64" width="160" height="80" rx="10" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="120" y="92" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#f4f4f5" font-weight="600">Form Input</text>
  <text x="120" y="112" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#71717a">title + details</text>
  <text x="120" y="128" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3b82f6">index.ejs</text>

  <!-- Arrow -->
  <line x1="200" y1="104" x2="256" y2="104" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="228" y="96" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#52525b">POST</text>

  <!-- Step 2: Express route -->
  <rect x="256" y="64" width="168" height="80" rx="10" fill="#1e3a5f" stroke="#2563eb" stroke-width="1"/>
  <text x="340" y="92" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#93c5fd" font-weight="600">Express Route</text>
  <text x="340" y="112" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#60a5fa">app.post('/create')</text>
  <text x="340" y="128" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3b82f6">req.body.title / .details</text>

  <!-- Arrow -->
  <line x1="424" y1="104" x2="478" y2="104" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="451" y="96" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#52525b">write</text>

  <!-- Step 3: fs.writeFile -->
  <rect x="478" y="64" width="162" height="80" rx="10" fill="#14301a" stroke="#16a34a" stroke-width="1"/>
  <text x="559" y="90" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#86efac" font-weight="600">fs.writeFile</text>
  <text x="559" y="110" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4ade80">./files/title.txt</text>
  <text x="559" y="128" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#22c55e">Node.js fs module</text>

  <!-- Redirect arrow down -->
  <line x1="340" y1="144" x2="340" y2="196" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="360" y="176" font-family="sans-serif" font-size="10" fill="#78716c">redirect</text>

  <!-- Redirect target -->
  <rect x="220" y="196" width="240" height="50" rx="10" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="340" y="218" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#f4f4f5" font-weight="500">res.redirect('/')</text>
  <text x="340" y="236" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#71717a">Back to home — task list refreshes</text>

  <!-- File system box -->
  <rect x="40" y="280" width="600" height="70" rx="10" fill="#1c1c1e" stroke="#3f3f46" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="60" y="304" font-family="sans-serif" font-size="11" fill="#52525b" font-weight="500" letter-spacing="1">./files/</text>
  <rect x="60" y="312" width="90" height="24" rx="6" fill="#27272a"/>
  <text x="105" y="328" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#a1a1aa">shopping.txt</text>
  <rect x="160" y="312" width="90" height="24" rx="6" fill="#27272a"/>
  <text x="205" y="328" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#a1a1aa">groceries.txt</text>
  <rect x="260" y="312" width="80" height="24" rx="6" fill="#2563eb" opacity=".7"/>
  <text x="300" y="328" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff">notes.txt ✦</text>
  <text x="368" y="328" font-family="sans-serif" font-size="10" fill="#52525b">← newly created</text>

  <!-- Arrow to filesystem -->
  <line x1="559" y1="144" x2="559" y2="270" stroke="#22c55e" stroke-width="1" opacity=".4" stroke-dasharray="4 3"/>
  <line x1="559" y1="270" x2="342" y2="279" stroke="#22c55e" stroke-width="1" opacity=".4" marker-end="url(#arrow)"/>
</svg>
